# ===================================================
# تنظیمات ربات
# هر provider که OpenAI-compatible API دارد کار میکند
# ===================================================

providers:
  - endpoint: "https://generativelanguage.googleapis.com/v1beta/openai"
    key_env: "GEMINI_KEY"
    models:
      - "gemini-3.5-flash"
      - "gemini-3-flash-preview"
      - "gemini-3.1-flash-lite"
      - "gemini-2.5-flash"
      - "gemini-2.5-pro"
    free: true

  # OpenAI
  # - endpoint: "https://api.openai.com"
  #   key_env: "OPENAI_KEY"
  #   models:
  #     - "gpt-4o-mini"
  #     - "gpt-3.5-turbo"
  #   free: false

  # Groq (free)
  # - endpoint: "https://api.groq.com/openai"
  #   key_env: "GROQ_KEY"
  #   models:
  #     - "llama-3.1-8b-instant"
  #     - "mixtral-8x7b-32768"
  #   free: true

bot:
  rpm_limit: 10
  worker_count: 20
  queue_size: 500
  max_context_messages: 10
  max_message_runes: 400

server:
  port: "10000"
  read_timeout: 10
  write_timeout: 10